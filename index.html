<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Study Tracker</h1>
        <form id="study-form">
            <input type="text" id="subject" placeholder="Subject" required>
            <input type="text" id="chapter" placeholder="Chapter" required>
            <input type="number" id="total-questions" placeholder="Total Questions" required>
            <button type="submit" id="add-btn">Add Chapter</button>
        </form>
        <table id="study-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Chapter</th>
                    <th>Total Questions</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
